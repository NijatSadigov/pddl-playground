name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      # npm install (not ci): the committed lockfile is generated on Windows and
      # omits some Linux-only native transitive deps, which strict `npm ci` rejects.
      - run: npm install --no-audit --no-fund
      - run: npm test
      - run: npm run build
